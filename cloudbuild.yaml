# Cloud Build config for deploying to Cloud Run
steps:
  # Build and push container
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'us-central1-docker.pkg.dev/$PROJECT_ID/voxel-kids/gateway:$SHORT_SHA', '.']

  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'us-central1-docker.pkg.dev/$PROJECT_ID/voxel-kids/gateway:$SHORT_SHA']

  # Deploy to Cloud Run (scale-to-zero for cost efficiency)
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'voxel-kids-gateway'
      - '--image=us-central1-docker.pkg.dev/$PROJECT_ID/voxel-kids/gateway:$SHORT_SHA'
      - '--region=us-central1'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--min-instances=0'
      - '--max-instances=3'
      - '--memory=512Mi'
      - '--cpu=1'
      - '--set-env-vars=GOOGLE_CLOUD_PROJECT=$PROJECT_ID,NODE_ENV=production'
      - '--set-secrets=GEMINI_API_KEY=GEMINI_API_KEY:latest'
      - '--timeout=300'

# Store images in Artifact Registry
images:
  - 'us-central1-docker.pkg.dev/$PROJECT_ID/voxel-kids/gateway:$SHORT_SHA'

options:
  logging: CLOUD_LOGGING_ONLY
